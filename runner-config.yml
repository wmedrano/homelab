# Forgejo Runner Configuration
# Place in forgejo-actions-runner-data volume at /data/runner-config.yml
#
# In v12+, connections are declared in this file directly (the `register`
# command is deprecated).  Fill in the token before deploying:
#
#   connections.git-wmedrano.token: <your-runner-token>

runner:
  name: homelab-runner
  file: .runner
  capacity: 1
  env_file: .env
  timeout: 3h
  shutdown_timeout: 0s
  labels:
    - "ubuntu-latest:docker://debian:bookworm"

cache:
  enabled: true
  dir: /data/cache
  host: ""
  port: 0
  external_server: ""

container:
  network: ""
  enable_ipv6: false
  options: ""
  workdir_parent: /data/workspace
  valid_volumes: []
  docker_hosts: []
  force_pull: false
  force_rebuild: false

log:
  level: info

connections:
  git-wmedrano:
    url: https://git.wmedrano.dev/
    token: ""  # Fill in your runner token before deploying
# Forgejo Runner Configuration
# Place in forgejo-actions-runner-data volume at /data/runner-config.yml
#
# In v12+, connections are declared under server.connections in the config
# file directly (the `register` command is deprecated).  Fill in the token
# and uuid before deploying:
#
#   server.connections.forgejo.token: <your-runner-token>
#   server.connections.forgejo.uuid: <uuid-from-forgejo-admin>

runner:
  name: homelab-runner
  file: .runner
  capacity: 1
  env_file: .env
  timeout: 3h
  shutdown_timeout: 0s
  labels:
    - "ubuntu-latest:docker://node:latest"

cache:
  enabled: true
  dir: /data/cache
  host: ""
  port: 0
  external_server: ""

container:
  network: ""
  enable_ipv6: false
  options: ""
  workdir_parent: /data/workspace
  valid_volumes: []
  docker_hosts: []
  force_pull: false
  force_rebuild: false

log:
  level: info

server:
  connections:
    forgejo:
      url: https://git.wmedrano.dev/
      uuid: ""  # Fill in UUID from Forgejo admin runner page
      token: ""  # Fill in your runner token before deploying